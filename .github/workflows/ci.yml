name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test, Build, And Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Root Tests
        run: npm test

      - name: Ingestion Tests
        run: npm run ingestion:test

      - name: Web Typecheck
        run: npm run typecheck --workspace apps/web

      - name: Web Build
        run: npm run build --workspace apps/web

      - name: Ingestion Dry Run
        run: npm run ingestion:dry-run

      - name: Mapping Dry Run
        run: npm run ingestion:mapping-dry-run

      - name: Secret Pattern Scan
        run: npm run secret:scan
